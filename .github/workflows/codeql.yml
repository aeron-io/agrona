name: "CodeQL"

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - master
      - release/**
  pull_request:
    types: [opened, synchronize]
    branches:
      - master
      - release/**

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ java ]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          languages: ${{ matrix.language }}
          queries: +security-and-quality
          config-file: ./.github/codeql/codeql-config.yml
          packs: "codeql/${{ matrix.language }}-queries:AlertSuppression.ql"

      - name: Autobuild
        uses: github/codeql-action/autobuild@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        if: ${{ matrix.language == 'java' }}

      - name: Perform CodeQL Analysis
        id: analyze
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          category: "/language:${{ matrix.language }}"
          upload: false
          output: sarif-results

      - name: Upload SARIF
        id: upload
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: sarif-results/${{ matrix.language }}.sarif
          wait-for-processing: true

      # optional: for debugging the uploaded sarif
      - name: Upload loc as a Build Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sarif-results-${{ matrix.language }}
          path: sarif-results
          retention-days: 1

      - name: Dismiss alerts
        if: github.ref == 'refs/heads/master'
        uses: advanced-security/dismiss-alerts@046d6b48d2e43cf563f96f67332c47c432eff83e # v2.0.2
        with:
          sarif-id: ${{ steps.upload.outputs.sarif-id }}
          sarif-file: sarif-results/${{ matrix.language }}.sarif
        env:
          GITHUB_TOKEN: ${{ github.token }}
